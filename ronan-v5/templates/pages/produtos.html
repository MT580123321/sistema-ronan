<div class="fade-in">
  <div class="page-title">Produtos</div>

  <div class="section-card">
    <div class="section-title">Cadastrar Produto</div>
    <div class="form-row" style="flex-wrap:wrap;gap:12px;align-items:flex-end">
      <div class="field"><label>Nome do Produto</label><input id="prod-nome" placeholder="Ex: Picanha, Cerveja Heineken…"/></div>
      <div class="field" style="max-width:160px">
        <label id="prod-preco-label">Preço (R$/un)</label>
        <input id="prod-preco" type="number" step="0.01" placeholder="0,00"/>
      </div>
      <div class="field" style="max-width:140px"><label>Estoque Inicial</label><input id="prod-estoque" type="number" placeholder="0"/></div>
      <div class="field" style="max-width:210px">
        <label>Categoria</label>
        <select id="prod-cat" onchange="atualizarLabelPreco('prod-cat','prod-preco-label')">
          <option value="Carnes">Carnes</option>
          <option value="Frango">Frango</option>
          <option value="Linguiça">Linguiça</option>
          <option value="Acompanhamentos">Acompanhamentos</option>
          <option value="Bebidas Alcoólicas">Bebidas Alcoólicas</option>
          <option value="Bebidas Não Alcoólicas">Bebidas Não Alcoólicas</option>
          <option value="Sobremesas">Sobremesas</option>
          <option value="Outros">Outros</option>
        </select>
      </div>
      <div class="field" style="max-width:160px">
        <label>Venda</label>
        <select id="prod-por-peso" onchange="atualizarLabelPreco('prod-cat','prod-preco-label')">
          <option value="0">Por Unidade</option>
          <option value="1">Por Kg (peso)</option>
        </select>
      </div>
      <button class="btn-action" onclick="addProduto()" style="height:42px;align-self:flex-end">+ CADASTRAR</button>
    </div>
    <div id="prod-peso-hint" style="display:none;margin-top:8px;color:var(--gold);font-size:13px">
      ⚖️ Produto por peso: informe o <strong>preço por kg</strong>. O peso será pesado e informado no pedido.
    </div>
  </div>

  <div class="section-card">
    <div class="section-title-row">
      <div class="section-title" style="margin-bottom:0">Cardápio <span class="count-badge" id="prod-count"></span></div>
      <div style="display:flex;gap:12px;align-items:center">
        <div class="field" style="max-width:240px;margin:0">
          <input id="prod-busca" placeholder="🔍  Buscar produto…"/>
        </div>
        <div class="field" style="max-width:220px;margin:0">
          <select id="prod-filtro-cat">
            <option value="">Todas as categorias</option>
            <option value="Carnes">Carnes</option>
            <option value="Frango">Frango</option>
            <option value="Linguiça">Linguiça</option>
            <option value="Acompanhamentos">Acompanhamentos</option>
            <option value="Bebidas Alcoólicas">Bebidas Alcoólicas</option>
            <option value="Bebidas Não Alcoólicas">Bebidas Não Alcoólicas</option>
            <option value="Sobremesas">Sobremesas</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
      </div>
    </div>
    <div class="table-wrap" style="margin-top:18px">
      <table>
        <thead><tr><th>#</th><th>Produto</th><th>Categoria</th><th>Preço</th><th>Venda</th><th>Estoque</th><th>Ações</th></tr></thead>
        <tbody id="produtos-tbody"><tr class="empty-row"><td colspan="7">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Editar Produto -->
<div id="modal-edit" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-title">✏️ Editar Produto</div>
    <input type="hidden" id="ep-id"/>
    <div class="field" style="margin-bottom:14px"><label>Nome</label><input id="ep-nome"/></div>
    <div class="field" style="margin-bottom:14px">
      <label id="ep-preco-label">Preço (R$)</label>
      <input id="ep-preco" type="number" step="0.01"/>
    </div>
    <div class="field" style="margin-bottom:14px"><label>Estoque</label><input id="ep-est" type="number"/></div>
    <div class="field" style="margin-bottom:14px">
      <label>Categoria</label>
      <select id="ep-cat" onchange="atualizarLabelPreco('ep-cat','ep-preco-label')">
        <option value="Carnes">Carnes</option>
        <option value="Frango">Frango</option>
        <option value="Linguiça">Linguiça</option>
        <option value="Acompanhamentos">Acompanhamentos</option>
        <option value="Bebidas Alcoólicas">Bebidas Alcoólicas</option>
        <option value="Bebidas Não Alcoólicas">Bebidas Não Alcoólicas</option>
        <option value="Sobremesas">Sobremesas</option>
        <option value="Outros">Outros</option>
      </select>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>Tipo de Venda</label>
      <select id="ep-por-peso" onchange="atualizarLabelPreco('ep-cat','ep-preco-label')">
        <option value="0">Por Unidade</option>
        <option value="1">Por Kg (peso)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-action" onclick="salvarEditProduto()">SALVAR</button>
    </div>
  </div>
</div>
