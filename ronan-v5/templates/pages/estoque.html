<div class="fade-in">
  <div class="page-title">Controle de Estoque</div>

  <div class="section-card">
    <div class="section-title">Ajustar Quantidade</div>
    <div class="form-row">
      <div class="field">
        <label>Produto</label>
        <select id="est-prod"><option value="">— Selecionar —</option></select>
      </div>
      <div class="field" style="max-width:180px">
        <label>Nova Quantidade</label>
        <input id="est-qtd" type="number" min="0" placeholder="0"/>
      </div>
      <button class="btn-action" onclick="ajustarEstoque()">ATUALIZAR</button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-title-row">
      <div class="section-title" style="margin-bottom:0">Situação do Estoque</div>
      <div class="field" style="max-width:280px;margin:0">
        <input id="est-busca" placeholder="🔍  Buscar produto ou categoria…"/>
      </div>
    </div>
    <div class="table-wrap" style="margin-top:18px">
      <table>
        <thead><tr><th>#</th><th>Produto</th><th>Categoria</th><th>Quantidade</th><th>Situação</th><th>Atualizado</th></tr></thead>
        <tbody id="estoque-tbody"><tr class="empty-row"><td colspan="6">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
